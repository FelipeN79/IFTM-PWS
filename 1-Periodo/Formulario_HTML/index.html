<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de cadastro</title>
</head>

<body>
    <h1 text style="color: blue; font-size: 25px; font-family: Arial, Helvetica, sans-serif;">Formulário de Cadastro</h1>
    <form>
        <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
        </div>

        <br><br>

        <label>Sexo:</label>

        <input type="radio" id="masc" name="genero" value="m">
        <label for="masc">Masculino</label>

        <input type="radio" id="fem" name="genero" value="f">
        <label for="fem">Feminino</label>

        <br><br></br>


        <label for="estado-civil">Estado Civil:</label>
        <select id="estado-civil" name="estado-civil">
            <option value="solteiro">Solteiro(a)</option>
            <option value="casado">Casado(a)</option>
            <option value="divorciado">Divorciado(a)</option>
            <option value="viuvo">Viúvo(a)</option>
            <option value="outro">Outro</option>
          </select>
        <br><br><br>

        <div>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            <br><br><br>
        </div>
        <div>
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" size="50" placeholder="Rua, número, cidade...">
            <label for="numero">Nº:</label>
            <select id="numero" name="numero">
              <option value="1">01</option>
              <option value="2">02</option>
              <option value="3">03</option>
              <option value="4">04</option>
              <option value="5">05</option>
              <option value="5">06</option>
              <option value="5">07</option>
              <option value="5">08</option>
              <option value="5">09</option>
              <option value="5">10</option>
              </select>
        </div>

        <br>
        <br>


        <div>
            <label for="nascimento">Data de Nascimento:</label>
            <input type="date" id="nascimento" name="nascimento">
        </div>

        <br><br>
        <div>
            <button type="submit">Cadastrar</button>
            <button type="reset">Limpar Dados</button>
        </div>

        </div>

        <br>
        </div>

        <br>





    </form>










    </form>








</body>

</html>
